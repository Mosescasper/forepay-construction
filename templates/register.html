<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — ForePay</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/register.css') }}" />
</head>
<body>

  <div class="register-wrapper">
    <div class="register-card"> 

      <!-- Brand -->
      <div class="brand">
        <div class="brand-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
               stroke="currentColor" stroke-width="2.2">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8V6m0 12v-2M4 12a8 8 0 1 0 16 0A8 8 0 0 0 4 12z"/>
          </svg>
        </div>
        <span class="brand-name">ForePay</span>
      </div>

      <!-- Heading -->
      <h1 class="register-heading">Create a ForePay admin account</h1>
      <p class="register-subtext">Start managing payroll, workers, and attendance from one secure dashboard.</p>

      <!-- Flash messages -->
      <div class="flash-messages">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, message in messages %}
            <div class="flash {{ category }}">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                   fill="none" stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round">
                {% if category == 'success' %}
                  <polyline points="20 6 9 17 4 12"/>
                {% elif category == 'warning' %}
                  <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                  <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
                {% else %}
                  <circle cx="12" cy="12" r="10"/>
                  <line x1="12" y1="8" x2="12" y2="12"/>
                  <line x1="12" y1="16" x2="12.01" y2="16"/>
                {% endif %}
              </svg>
              {{ message }}
            </div>
          {% endfor %}
        {% endwith %}
      </div>

      <!-- Form -->
      <form id="registerForm" method="POST" action="{{ url_for('register') }}" novalidate>

        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <div class="input-wrap">
            <input
              class="form-input"
              type="text"
              id="username"
              name="username"
              placeholder="Choose a username"
              autocomplete="username"
              required
            />
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                 stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                    d="M16 7a4 4 0 1 1-8 0 4 4 0 0 1 8 0zM12 14a7 7 0 0 0-7 7h14a7 7 0 0 0-7-7z"/>
            </svg>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <div class="input-wrap">
            <input
              class="form-input"
              type="email"
              id="email"
              name="email"
              placeholder="Enter your email"
              autocomplete="email"
              required
            />
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                 stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                    d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrap">
            <input
              class="form-input"
              type="password"
              id="password"
              name="password"
              placeholder="Create a password"
              autocomplete="new-password"
              required
            />
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                 stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <button type="button" class="toggle-pw" id="togglePassword" aria-label="Toggle password">
              <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                   fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg id="eyeClosed" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                   fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"
                   style="display:none">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94
                         M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19
                         M1 1l22 22"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm_password">Confirm Password</label>
          <div class="input-wrap">
            <input
              class="form-input"
              type="password"
              id="confirm_password"
              name="confirm_password"
              placeholder="Confirm your password"
              autocomplete="new-password"
              required
            />
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                 stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </div>
        </div>

        <button type="submit" class="btn-register" id="registerBtn">
          <span class="btn-text">Create Account</span>
          <span class="btn-spinner"></span>
        </button>

      </form>

      <div class="register-footer">
        Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
      </div>

    </div>
  </div>

  <script src="{{ url_for('static', filename='js/register.js') }}"></script>
</body>
</html>
